<body>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    


    <main class="shop-page-container">
        <a href="index.html"><img src="assets/img/header.png" alt="TechJeeper Designs" class="header-logo"></a>
        <h1>Shop</h1>
        <p class="tagline">
            <span>H</span><span>a</span><span>n</span><span>d</span><span>m</span><span>a</span><span>d</span><span>e</span>
            <span>&</span>
            <span>3</span><span>D</span>
            <span>P</span><span>r</span><span>i</span><span>n</span><span>t</span><span>e</span><span>d</span>
            <br>
            <span>C</span><span>r</span><span>e</span><span>a</span><span>t</span><span>i</span><span>o</span><span>n</span><span>s</span>
        </p>
        
        <div class="category-filters" id="category-filters"></div>
        
        <div class="shop-grid" id="shop-items">
        </div>
    </main>

    <script>
        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            const cursor = document.querySelector('.cursor');
            const cursorFollower = document.querySelector('.cursor-follower');

            if (cursor && cursorFollower) {
                document.addEventListener('mousemove', (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                    
                    cursorFollower.style.left = e.clientX + 'px';
                    cursorFollower.style.top = e.clientY + 'px';
                });

                // Add hover effect to interactive elements
                const interactiveElements = document.querySelectorAll('a, button, .shop-item');
                interactiveElements.forEach(element => {
                    if (element) {  // Check if element exists
                        element.addEventListener('mouseenter', () => {
                            if (cursor && cursorFollower) {  // Check if cursor elements exist
                                cursor.classList.add('hovering');
                                cursorFollower.classList.add('hovering');
                            }
                        });
                        
                        element.addEventListener('mouseleave', () => {
                            if (cursor && cursorFollower) {  // Check if cursor elements exist
                                cursor.classList.remove('hovering');
                                cursorFollower.classList.remove('hovering');
                            }
                        });
                    }
                });
            }
        });

        // Shop Manager for Etsy Integration
        class ShopManager {
            constructor() {
                this.shopContainer = document.getElementById('shop-items');
                this.categoryFiltersContainer = document.getElementById('category-filters');

                this.currentCategory = 'all';
                this.items = [];
                this.allItems = [];
                this.etsyItems = [];
                this.isFetching = false;

                // Category labels for the top filter buttons
                this.categoryLabels = {
                    all: 'All Items',
                    '3dprinted': '3D Printed',
                    'fiberarts': 'Fiber Arts',
                    'jewelry': 'Jewelry',
                    other: 'Other'
                };

                this.init();
            }

            async init() {
                // Get category from URL parameter
                const urlParams = new URLSearchParams(window.location.search);
                const categoryParam = urlParams.get('category');
                if (categoryParam) this.currentCategory = categoryParam;

                // Load from sessionStorage if available
                const cachedData = sessionStorage.getItem('shopItemsCache');
                const cacheTime = sessionStorage.getItem('shopItemsCacheTime');
                const CACHE_EXPIRATION_MS = 60 * 60 * 1000; // 1 hour

                let hasCache = false;
                if (cachedData && cacheTime && (Date.now() - parseInt(cacheTime) < CACHE_EXPIRATION_MS)) {
                    try {
                        const parsed = JSON.parse(cachedData);
                        if (Array.isArray(parsed)) {
                            // Only keep Etsy items (Ko-Fi shop is closed)
                            this.allItems = parsed.filter(item => item && item.Source === 'Etsy');
                            hasCache = this.allItems.length > 0;
                            if (hasCache) console.log('Loaded Etsy shop items from sessionStorage cache');
                        }
                    } catch (e) {
                        console.error('Error parsing cache', e);
                    }
                }

                if (!hasCache) {
                    await this.fetchItems();
                }

                // If fetching failed, `fetchItems()` already rendered an error.
                if (!this.allItems || this.allItems.length === 0) {
                    return;
                }

                // Ensure every item has a computed category key
                this.normalizeItemCategories();

                // Determine which categories to show
                const availableCategoryKeys = this.getAvailableCategoryKeys();

                // Validate URL-selected category
                if (this.currentCategory !== 'all' && !availableCategoryKeys.includes(this.currentCategory)) {
                    this.currentCategory = 'all';
                    const url = new URL(window.location.href);
                    url.searchParams.delete('category');
                    window.history.pushState({}, '', url);
                }

                this.buildCategoryButtons(availableCategoryKeys);
                this.applyCategoryFilter(this.currentCategory);
            }

            decodeHtmlEntities(str) {
                // RSS description is often XML/HTML-escaped; decode before parsing.
                const textarea = document.createElement('textarea');
                textarea.innerHTML = str;
                return textarea.value;
            }

            categorizeEtsyItem(title, description) {
                const text = `${title} ${description}`.toLowerCase();

                // Priority order matters.
                const jewelryPatterns = [
                    'jewelry', 'jewel', 'earring', 'earrings', 'necklace', 'bracelet',
                    'pendant', 'resin pendant', 'resin', 'beads'
                ];
                const printPatterns = [
                    '3d printed', '3d', '3-d', 'stl', 'filament', 'print', 'printed model', '3d model'
                ];
                const fiberPatterns = [
                    'fiber arts', 'fiber art', 'fiber', 'crochet', 'knit', 'knitting', 'yarn',
                    'macrame', 'felt', 'embroidery', 'weaving', 'loom', 'stitch'
                ];

                const matchesAny = (patterns) => patterns.some(p => text.includes(p));

                if (matchesAny(jewelryPatterns)) return 'jewelry';
                if (matchesAny(printPatterns)) return '3dprinted';
                if (matchesAny(fiberPatterns)) return 'fiberarts';

                return 'other';
            }

            normalizeItemCategories() {
                this.allItems = (this.allItems || []).filter(Boolean);

                this.allItems.forEach(item => {
                    const title = item.Name || '';
                    const desc = item.Description || '';
                    item.Category = this.categorizeEtsyItem(title, desc);
                });
            }

            getAvailableCategoryKeys() {
                const keys = new Set();
                this.allItems.forEach(item => {
                    if (!item || !item.Category) return;
                    keys.add(item.Category);
                });

                // Prefer stable ordering.
                const ordered = ['3dprinted', 'fiberarts', 'jewelry', 'other'];
                return ordered.filter(k => keys.has(k));
            }

            buildCategoryButtons(availableCategoryKeys) {
                if (!this.categoryFiltersContainer) return;

                // Clear existing UI (important when using cache vs fresh fetch)
                this.categoryFiltersContainer.innerHTML = '';

                const addButton = (key, label) => {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn' + (key === this.currentCategory ? ' active' : '');
                    btn.dataset.category = key;
                    btn.type = 'button';
                    btn.textContent = label;
                    btn.addEventListener('click', () => this.handleCategoryClick(key));
                    this.categoryFiltersContainer.appendChild(btn);
                    return btn;
                };

                // Default category
                addButton('all', this.categoryLabels.all);

                // Dynamic sections (derived from Etsy item text)
                availableCategoryKeys.forEach(key => {
                    if (key === 'all') return;
                    addButton(key, this.categoryLabels[key] || key);
                });

                // Shuffle button (kept last)
                const shuffleBtn = document.createElement('button');
                shuffleBtn.className = 'shuffle-btn';
                shuffleBtn.id = 'shuffle-items';
                shuffleBtn.type = 'button';
                shuffleBtn.innerHTML = '<i class="fas fa-random"></i> Shuffle';
                shuffleBtn.addEventListener('click', () => {
                    const icon = shuffleBtn.querySelector('i');
                    if (icon) icon.style.transform = 'rotate(180deg)';

                    this.shopContainer.classList.add('fade-out');
                    setTimeout(() => {
                        this.shuffleItems();
                        this.renderItems();
                        this.shopContainer.classList.remove('fade-out');

                        setTimeout(() => {
                            if (icon) icon.style.transform = '';
                        }, 500);
                    }, 300);
                });
                this.categoryFiltersContainer.appendChild(shuffleBtn);
            }

            handleCategoryClick(category) {
                this.currentCategory = category;

                // Update URL with the selected category
                const url = new URL(window.location.href);
                if (category === 'all') {
                    url.searchParams.delete('category');
                } else {
                    url.searchParams.set('category', category);
                }
                window.history.pushState({}, '', url);

                // Update active button immediately
                const btns = this.categoryFiltersContainer.querySelectorAll('.category-btn');
                btns.forEach(b => b.classList.remove('active'));
                const activeBtn = Array.from(btns).find(b => b.dataset.category === category);
                if (activeBtn) activeBtn.classList.add('active');

                // Add a subtle animation to the shop grid
                this.shopContainer.classList.add('fade-out');
                setTimeout(() => {
                    this.applyCategoryFilter(this.currentCategory);
                    this.shopContainer.classList.remove('fade-out');
                }, 300);
            }

            async fetchItems() {
                if (this.allItems.length !== 0) return;

                this.isFetching = true;
                this.showLoading();

                await this.fetchEtsyItems();
                this.allItems = [...(this.etsyItems || [])];

                this.isFetching = false;

                if (this.allItems.length === 0) {
                    this.showError(`
                        <h3>Unable to fetch items from Etsy</h3>
                        <p>The Etsy RSS feed may be unavailable or blocked by CORS.</p>
                        <p>Please try again later or visit your shop directly:</p>
                        <p>
                            <a href="https://www.etsy.com/shop/TechJeeperDesigns" target="_blank" class="shop-item-button" style="max-width: 200px; margin: 5px auto;">Visit Etsy Shop</a>
                        </p>
                    `);
                    return;
                }

                this.cacheItems();
            }

            cacheItems() {
                if (!this.allItems || this.allItems.length === 0) return;
                try {
                    sessionStorage.setItem('shopItemsCache', JSON.stringify(this.allItems));
                    sessionStorage.setItem('shopItemsCacheTime', Date.now().toString());
                } catch (e) {
                    console.warn('Could not save to sessionStorage:', e);
                }
            }

            async fetchEtsyItems() {
                try {
                    const rssUrl = 'https://www.etsy.com/shop/TechJeeperDesigns/rss';
                    // AllOrigins is used to reliably handle XML responses + CORS.
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;

                    const response = await fetch(proxyUrl);
                    if (!response.ok) throw new Error('Failed to fetch Etsy feed');

                    const data = await response.json();
                    if (!data.contents) throw new Error('No content in Etsy feed response');

                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(data.contents, 'text/xml');
                    const items = xmlDoc.querySelectorAll('item');

                    this.etsyItems = Array.from(items).map(item => {
                        const title = item.querySelector('title')?.textContent || 'Untitled';
                        const link = item.querySelector('link')?.textContent || '#';

                        const rawDesc = item.querySelector('description')?.textContent || '';
                        const decodedDesc = this.decodeHtmlEntities(rawDesc);
                        const descDoc = parser.parseFromString(decodedDesc, 'text/html');

                        const priceText = descDoc.querySelector('.price')?.textContent?.trim();
                        const price = priceText || 'Check Etsy';

                        const imgEl = descDoc.querySelector('img');
                        const thumbnail = imgEl?.getAttribute('src') || 'assets/img/placeholder.png';

                        const descriptionText =
                            descDoc.querySelector('.description')?.textContent?.trim() ||
                            descDoc.body.textContent?.trim() ||
                            '';

                        const cleanDescBase = descriptionText
                            .replace(/Check out this item on Etsy/g, '')
                            .replace(/\s+/g, ' ')
                            .trim();

                        const cleanDesc = cleanDescBase.substring(0, 100) + (cleanDescBase.length > 100 ? '...' : '');

                        // Stable alias based on listing link
                        const listingIdMatch = link.match(/\/listing\/(\d+)/);
                        const listingId = listingIdMatch ? listingIdMatch[1] : Math.random().toString(36).substr(2, 9);

                        const category = this.categorizeEtsyItem(title, cleanDesc);

                        return {
                            Name: title,
                            Description: cleanDesc,
                            Price: price,
                            ThumbnailUrls: [thumbnail],
                            Alias: `etsy-${listingId}`,
                            Link: link,
                            Source: 'Etsy',
                            IsSoldOut: false,
                            Category: category
                        };
                    });

                    console.log(`Fetched ${this.etsyItems.length} Etsy items`);
                } catch (error) {
                    console.error('Error fetching Etsy items:', error);
                    this.etsyItems = [];
                }
            }

            applyCategoryFilter(category) {
                category = category || 'all';

                if (category === 'all') {
                    this.items = [...this.allItems];
                } else {
                    this.items = this.allItems.filter(item => item && item.Category === category);
                }

                // Shuffle items to randomize the display order
                this.shuffleItems();
                this.renderItems();
            }

            renderItems() {
                if (!this.items || this.items.length === 0) {
                    this.shopContainer.innerHTML = `
                        <div class="error-message">
                            <i class="fas fa-exclamation-circle fa-2x"></i>
                            <p>No items found in this category.</p>
                        </div>
                    `;
                    return;
                }
                
                // Define the featured item alias - this is the one specified in the requirements
                const featuredItemAlias = '6a271ebad7';
                
                // Flag to track if we've found and highlighted the featured item
                let featuredItemFound = false;
                
                // If we're in "All Items" category, move the featured item to the top of the list
                if (this.currentCategory === 'all') {
                    // Find the featured item
                    const featuredItemIndex = this.items.findIndex(item => item.Alias === featuredItemAlias);
                    
                    // If found, move it to the beginning of the array
                    if (featuredItemIndex !== -1) {
                        featuredItemFound = true;
                        const featuredItem = this.items.splice(featuredItemIndex, 1)[0];
                        this.items.unshift(featuredItem);
                    }
                }
                
                const itemsHTML = this.items.map((item, index) => {
                    // Handle image URL formatting (Etsy gives full URLs)
                    let imageUrl = 'assets/img/placeholder.png';
                    if (item.ThumbnailUrls && item.ThumbnailUrls.length > 0) {
                        const candidate = item.ThumbnailUrls[0];
                        if (candidate.startsWith('http') || candidate.startsWith('assets/')) imageUrl = candidate;
                    }
                    
                    // Handle sold-out status
                    const soldOutBadge = item.IsSoldOut ? 
                        `<div class="sold-out-badge">Sold Out</div>` : 
                        (item.ItemsAvailable && item.ItemsAvailable < 3 ? 
                            `<div class="limited-badge">Only ${item.ItemsAvailable} left!</div>` : '');
                    
                    // Check if this item should be featured
                    const isFeaturedItem = this.currentCategory === 'all' && 
                                         item.Alias === featuredItemAlias;
                    
                    // If this is the featured item, mark it as found
                    if (isFeaturedItem) {
                        featuredItemFound = true;
                    }
                    
                    // Add featured class and badge if this is the featured item
                    const featuredClass = isFeaturedItem ? 'featured' : '';
                    const featuredBadge = isFeaturedItem ? 
                        `<div class="featured-badge">Featured Item</div>` : '';

                    // Determine Link URL
                    const itemLink = item.Link || 'https://www.etsy.com/shop/TechJeeperDesigns';

                    // Source Badge (Optional, but good for UX)
                    const sourceBadge = item.Source ? `<div style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.7); color:white; padding:4px 8px; border-radius:4px; font-size:12px;">${item.Source}</div>` : '';
                    
                    return `
                        <div class="shop-item ${item.IsSoldOut ? 'sold-out' : ''} ${featuredClass}">
                            ${soldOutBadge}
                            ${featuredBadge}
                            ${sourceBadge}
                            <a href="${itemLink}" target="_blank" class="shop-item-image-link">
                                <img src="${imageUrl}" 
                                    alt="${item.Name}" class="shop-item-image" 
                                    onerror="this.onerror=null; this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAwIiBoZWlnaHQ9IjQwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMkEyQTJBIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIyNCIgZmlsbD0iIzAwQkZGRiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPkltYWdlIE5vdCBBdmFpbGFibGU8L3RleHQ+PC9zdmc+';">
                            </a>
                            <div class="shop-item-info">
                                <h3 class="shop-item-title">
                                    <a href="${itemLink}" target="_blank" class="shop-item-title-link">
                                        ${item.Name}
                                    </a>
                                </h3>
                                <p class="shop-item-description">${item.Description || 'No description available'}</p>
                                <p class="shop-item-price">${this.formatPrice(item.Price)}</p>
                                <a href="${itemLink}" target="_blank" class="shop-item-button">
                                    ${item.IsSoldOut ? 'View Details' : 'Purchase'}
                                </a>
                            </div>
                        </div>
                    `;
                }).join('');
                
                this.shopContainer.innerHTML = itemsHTML;
                
                // If we're in the "all" category and haven't found the featured item,
                // we need to make a fallback by featuring the first item
                if (this.currentCategory === 'all' && !featuredItemFound && this.items.length > 0) {
                    const firstItem = this.shopContainer.querySelector('.shop-item');
                    if (firstItem) {
                        firstItem.classList.add('featured');
                        const featuredBadge = document.createElement('div');
                        featuredBadge.className = 'featured-badge';
                        featuredBadge.textContent = 'Featured Item';
                        firstItem.prepend(featuredBadge);
                    }
                }
                
                // Reattach event listeners to new elements
                document.querySelectorAll('.shop-item').forEach(element => {
                    element.addEventListener('mouseenter', () => {
                    });
                    
                    element.addEventListener('mouseleave', () => {
                    });
                });
            }

            formatPrice(price) {
                if (!price) return 'Price not available';
                
                // Handle different price formats
                if (typeof price === 'number') {
                    return `$${price.toFixed(2)}`;
                } else if (typeof price === 'string') {
                    // If price is already formatted, return as is
                    if (price.includes('$')) return price;
                    
                    // Try to convert to number and format
                    const numPrice = parseFloat(price);
                    if (!isNaN(numPrice)) {
                        return `$${numPrice.toFixed(2)}`;
                    }
                    
                    return price;
                }
                
                return 'Price not available';
            }

            showLoading() {
                this.shopContainer.innerHTML = `
                    <div class="loading-overlay">
                        <i class="fas fa-spinner fa-spin fa-4x"></i>
                        <p>Loading shop please wait...</p>
                    </div>
                `;
            }

            showError(message) {
                this.shopContainer.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-circle fa-2x"></i>
                        <div>${message}</div>
                    </div>
                `;
            }

            shuffleItems() {
                for (let i = this.items.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [this.items[i], this.items[j]] = [this.items[j], this.items[i]];
                }
            }
        }

        // Initialize the shop when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            const shopManager = new ShopManager();
        });
    </script>
    
    <!-- Background script from index.html -->
    <script src="assets/js/background.js"></script>

    <footer>
        <p><a href="mailto:contact@techjeeper.com">Collaboration Inquiries</a></p>
    </footer>
